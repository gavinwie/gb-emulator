<!DOCTYPE html>
<html>
    <head>
        <title>Rust Game Boy Emulator</title>
        <meta charset="utf-8">
        <style>
            :root {
                color-scheme: dark;
            }

            body {
                margin: 0;
                padding: 2rem 1rem;
                background: #111;
                color: #f2f2f2;
                font-family: "Arial", "Helvetica", sans-serif;
                text-align: center;
            }

            label, input {
                color: #f2f2f2;
            }

            canvas {
                display: block;
                margin: 1.5rem auto 0;
                background: #000;
                border: 1px solid #333;
            }
        </style>
    </head>
    <body>
        <h1>Rust Game Boy Emulator</h1>
        <label for="fileinput">Select a GB game: </label>
        <br/><br/>
        <input type="file" id="fileinput" accept=".gb,.dmg" autocomplete="off"/>
        <br/><br/>
        <canvas id="canvas" width="160px" height="144px">If you can see this, then your browser doesn't support HTML5 and is old.</canvas>
    </body>
    <script type="module" src="index.js"></script>
</html>
